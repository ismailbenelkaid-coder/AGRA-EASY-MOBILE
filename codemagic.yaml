workflows:
  maui-ios:
    name: AGRA EASY MOBILE iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    # In Codemagic, create an App Store Connect API key integration named "codemagic-api"
    # or change the value below to match the integration name you choose.
    integrations:
      app_store_connect: codemagic-api

    environment:
      groups:
        - firebase
      xcode: 26.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: fr.groupeagra.easymobile
      vars:
        DOTNET_VERSION: 10.0.300
        DOTNET_PATH: $HOME/dotnet
        DOTNET: $HOME/dotnet/dotnet
        PROJECT_FILE: AGRA-EASY-MOBILE.csproj
        BUNDLE_ID: fr.groupeagra.easymobile
        APP_DISPLAY_VERSION: "1.0"

    scripts:
      - name: Install .NET SDK
        script: |
          xcodebuild -version
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version "$DOTNET_VERSION" --install-dir "$DOTNET_PATH"
          "$DOTNET" --info

      - name: Install .NET MAUI iOS workload
        script: |
          "$DOTNET" nuget locals all --clear
          "$DOTNET" workload install ios maui \
            --skip-manifest-update \
            --source https://api.nuget.org/v3/index.json
          "$DOTNET" workload list

      - name: Restore packages
        script: |
          "$DOTNET" restore "$PROJECT_FILE" \
            -p:TargetFramework=net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64

      - name: Restore Firebase iOS config
        script: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "GOOGLE_SERVICE_INFO_PLIST_BASE64 is required for Firebase iOS notifications."
            exit 1
          fi
          mkdir -p "$CM_BUILD_DIR/Firebase"
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > "$CM_BUILD_DIR/Firebase/GoogleService-Info.plist"

      - name: Set iOS Info.plist values
        script: |
          PLIST="$CM_BUILD_DIR/Platforms/iOS/Info.plist"
          PLIST_BUDDY=/usr/libexec/PlistBuddy
          $PLIST_BUDDY -c "Delete :ITSAppUsesNonExemptEncryption" "$PLIST" || true
          $PLIST_BUDDY -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"

      - name: Build signed iOS IPA
        script: |
          UPDATED_BUILD_NUMBER=$BUILD_NUMBER
          CERT_NAME=$(keychain list-certificates | jq -r '.[0].common_name')
          PROFILE_NAME=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -exec sh -c '/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$(security cms -D -i "$1")"' _ {} \; | head -n 1)

          "$DOTNET" publish "$PROJECT_FILE" \
            -f net10.0-ios \
            -c Release \
            -p:BuildIpa=True \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ApplicationDisplayVersion="$APP_DISPLAY_VERSION" \
            -p:ApplicationVersion="$UPDATED_BUILD_NUMBER" \
            -p:CodesignKey="$CERT_NAME" \
            -p:CodesignProvision="$PROFILE_NAME" \
            -o "$CM_BUILD_DIR/artifacts"

    artifacts:
      - artifacts/*.ipa

    publishing:
      email:
        recipients:
          - ismail.benelkaid@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
